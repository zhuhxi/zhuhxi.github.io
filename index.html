<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <meta name="description" content="Personal homepage" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.08);
      --text: #eef2ff;
      --muted: #a5b4fc;
      --line: rgba(255,255,255,0.12);
      --accent: #7c3aed;
      --accent2: #06b6d4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(124,58,237,0.25), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(6,182,212,0.2), transparent 28%),
        linear-gradient(180deg, #0b1020 0%, #111827 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .wrap {
      width: min(920px, calc(100vw - 32px));
      padding: 24px;
    }
    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
    }
    .eyebrow {
      margin: 0 0 20px;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    h1 {
      margin: 0;
      font-size: clamp(44px, 8vw, 88px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }
    .sub {
      margin: 18px 0 0;
      font-size: clamp(16px, 2vw, 22px);
      color: rgba(238,242,255,0.78);
      line-height: 1.7;
      max-width: 580px;
    }
    .line {
      margin: 36px 0;
      height: 1px;
      background: var(--line);
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      color: rgba(238,242,255,0.62);
      font-size: 14px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 20px rgba(124,58,237,0.8);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <p class="eyebrow">Personal Website</p>
      <h1>Hello.</h1>
      <p class="sub">A simple homepage is live here for now. Content can be added later.</p>
      <div class="line"></div>
      <div class="footer">
        <span>Coming soon</span>
        <span class="dot"></span>
      </div>
    </section>
  </main>
</body>
</html>
